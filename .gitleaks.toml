# gitleaks configuration for zwasm.
# Full-history scan is clean; this only suppresses a known false positive:
# WASM_C_API_PIN_DEFAULT is the upstream WebAssembly/wasm-c-api git commit SHA
# used to fetch include/wasm.h — a 40-char hex that trips the generic-api-key
# rule. It is a public pin, not a secret.
[extend]
useDefault = true

[allowlist]
description = "Known non-secrets (upstream commit-SHA pins)."
regexes = [
  '''WASM_C_API_PIN_DEFAULT=[0-9a-f]{40}''',
]
paths = [
  '''scripts/fetch_wasm_c_api\.sh''',
]
